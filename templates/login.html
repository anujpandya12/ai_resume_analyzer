<!DOCTYPE html>
<html>
<head>

    <title>ATS Admin Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );
        }

        .login-card{

            width:420px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(15px);

            border-radius:25px;

            padding:40px;

            color:white;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.4);

            text-align:center;
        }

        .logo{

            font-size:60px;

            margin-bottom:10px;
        }

        h1{

            color:#38bdf8;

            margin-bottom:10px;
        }

        p{

            color:#cbd5e1;

            margin-bottom:30px;
        }

        input{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            margin-bottom:15px;

            font-size:15px;

            outline:none;
        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            background:#38bdf8;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#0ea5e9;

            transform:translateY(-2px);
        }

        .footer{

            margin-top:20px;

            color:#94a3b8;

            font-size:13px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🚀
    </div>

    <h1>ATS Admin Login</h1>

    <p>
        AI Resume Analyzer Dashboard
    </p>

    <form action="/admin-login"
          method="POST">

        <input
            type="text"
            name="username"
            placeholder="Admin Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>

    <div class="footer">

        AI Recruitment Management System

    </div>

</div>

</body>
</html>
